general {
    grace = 2
    ignore_empty_input = true
}

background {
    monitor =
    path = ~/Downloads/Lake-Hylia.jpg
    blur_passes = 2
    blur_size = 4
    brightness = 0.6
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    outer_color = rgb(D3BCFD)
    inner_color = rgb(151218)
    font_color = rgb(E7E0E8)
    check_color = rgb(D3BCFD)
    fail_color = rgb(F0B7C5)
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 10
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 72
    font_family = monospace
    color = rgba(E7E0E8ff)
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    font_size = 18
    font_family = monospace
    color = rgba(CDC2DBff)
    position = 0, 10
    halign = center
    valign = center
}
